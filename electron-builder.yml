appId: com.indinotes.app
productName: IndiNotes
copyright: Copyright © 2024

directories:
  output: release
  buildResources: public

files:
  - "**/*"
  - "!src/**"
  - "!.git/**"
  - "!.github/**"
  - "!scripts/**"
  - "!android/**"
  - "!public/screenshots/**"
  - "!*.md"
  - "!vitest.config.ts"
  - "!AGENTS.md"
  - "!GEMINI.md"
  - "!skills.md"
  - "!PLAN.md"
  - "!SPEC.md"

extraMetadata:
  maintainer: IndiNotes

publish:
  provider: github
  owner: himanshu-2010
  repo: indinotes

linux:
  target:
    - AppImage
    - deb
    - rpm
    - snap
  category: Office
  icon: public/icon.png
  maintainer: IndiNotes

nsis:
  oneClick: false
  perMachine: false

win:
  target:
    - nsis
  icon: public/icon.png

mac:
  target:
    - dmg
  icon: public/icon.png
